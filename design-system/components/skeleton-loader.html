<!-- @dsCard group="Estados" name="Skeleton Loader" subtitle="Placeholder para datos cargando · anti-parpadeo" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #FAF7F2; padding: 28px; max-width: 390px; }
.label { font-size: 11px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: #AE9B87; margin-bottom: 14px; }
.section { margin-bottom: 24px; }
.skeleton { background: linear-gradient(90deg, #F9F4EC 0%, #FFFDF8 50%, #F9F4EC 100%); background-size: 200% 100%; animation: loading 1.5s infinite; border-radius: 12px; }
@keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.skeleton-card { border-radius: 32px; border: 1px solid #EAE0D3; padding: 20px; margin-bottom: 10px; }
.skeleton-title { height: 20px; width: 60%; margin-bottom: 10px; }
.skeleton-body { height: 16px; width: 100%; margin-bottom: 6px; }
.skeleton-body:last-child { width: 80%; }
.skeleton-chip-row { display: flex; gap: 10px; margin-bottom: 12px; }
.skeleton-chip { height: 32px; width: 100px; border-radius: 999px; }
.skeleton-text-line { height: 14px; margin-bottom: 8px; width: 100%; }
.skeleton-text-line.short { width: 70%; }
.skeleton-image { height: 150px; border-radius: 20px; margin-bottom: 12px; }
.skeleton-button { height: 48px; border-radius: 999px; width: 100%; margin-bottom: 10px; }
.skeleton-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.skeleton-stat { height: 100px; border-radius: 32px; }
</style></head><body>

<div class="section">
  <div class="label">Skeleton — Card simple</div>
  <div class="skeleton-card">
    <div class="skeleton skeleton-title"></div>
    <div class="skeleton skeleton-body"></div>
    <div class="skeleton skeleton-body" style="width:90%"></div>
  </div>
</div>

<div class="section">
  <div class="label">Skeleton — Receta completa</div>
  <div class="skeleton-card">
    <div class="skeleton skeleton-image"></div>
    <div class="skeleton skeleton-title" style="width:80%"></div>
    <div class="skeleton skeleton-text-line"></div>
    <div class="skeleton skeleton-text-line short"></div>
    <div style="margin-top:14px; margin-bottom:10px;">
      <div class="skeleton skeleton-text-line" style="width:50%; margin-bottom:4px;"></div>
      <div class="skeleton-chip-row">
        <div class="skeleton skeleton-chip"></div>
        <div class="skeleton skeleton-chip"></div>
        <div class="skeleton skeleton-chip"></div>
      </div>
    </div>
    <div class="skeleton skeleton-button"></div>
  </div>
</div>

<div class="section">
  <div class="label">Skeleton — Grid de stats</div>
  <div class="skeleton-grid">
    <div class="skeleton skeleton-stat"></div>
    <div class="skeleton skeleton-stat"></div>
  </div>
</div>

<div class="section">
  <div class="label">Skeleton — Fila de items</div>
  <div style="margin-bottom:10px;">
    <div class="skeleton-card" style="padding:16px;">
      <div class="skeleton skeleton-title" style="height:16px; margin-bottom:8px; width:40%"></div>
      <div class="skeleton skeleton-text-line" style="height:12px; width:100%;"></div>
    </div>
  </div>
  <div style="margin-bottom:10px;">
    <div class="skeleton-card" style="padding:16px;">
      <div class="skeleton skeleton-title" style="height:16px; margin-bottom:8px; width:50%"></div>
      <div class="skeleton skeleton-text-line" style="height:12px; width:90%;"></div>
    </div>
  </div>
  <div style="margin-bottom:10px;">
    <div class="skeleton-card" style="padding:16px;">
      <div class="skeleton skeleton-title" style="height:16px; margin-bottom:8px; width:45%"></div>
      <div class="skeleton skeleton-text-line" style="height:12px; width:85%;"></div>
    </div>
  </div>
</div>

</body></html>

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-toml
      - id: check-json

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^backend/app/
      - id: ruff-format
        files: ^backend/app/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args: [--config-file=backend/pyproject.toml]
        # El escudo aplica al código de la app, no a los scripts de smoke test
        # (harness con sys.path/helpers sin tipar; se verifican ejecutándolos).
        files: ^backend/app/
        additional_dependencies:
          - pydantic>=2.0
          - sqlalchemy>=2.0
          # Sin los tipos de estas libs, mypy infiere Any y dispara no-any-return
          # en security.py (bcrypt.hashpw().decode, jwt.encode/decode).
          - bcrypt>=4.0
          - pyjwt>=2.8
          - types-redis>=4.6

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: asistente_hogar_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass_2026
      POSTGRES_DB: asistente_hogar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

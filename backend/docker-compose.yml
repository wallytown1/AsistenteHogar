services:
  db:
    image: postgres:16-alpine
    container_name: asistente_hogar_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass_2026
      POSTGRES_DB: asistente_hogar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: asistente_hogar_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Persistencia AOF para no perder caché/rate-limit ante reinicios
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru

volumes:
  postgres_data:
  redis_data:

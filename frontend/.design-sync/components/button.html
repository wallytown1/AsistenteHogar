<!-- @dsCard group="Acciones" name="Button" subtitle="4 variantes × 3 tamaños + loading/disabled" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #FAF7F2; padding: 28px; max-width: 390px; }
.label { font-size: 11px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: #AE9B87; margin-bottom: 14px; }
.section { margin-bottom: 24px; }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; border-radius: 999px; cursor: pointer; font-family: inherit; font-weight: 700; border: 1px solid transparent; width: 100%; }
.btn-primary   { background: #8B5E3C; color: #fff; }
.btn-secondary { background: #F6EDE3; color: #6B4429; }
.btn-ghost     { background: transparent; color: #2C1C0E; border-color: #D9CCBC; }
.btn-danger    { background: #B84B2D; color: #fff; }
.btn-disabled  { background: #EAE0D3; color: #AE9B87; cursor: not-allowed; }
.sm  { padding: 9px 20px; font-size: 13px; }
.md  { padding: 13px 20px; font-size: 15px; }
.lg  { padding: 16px 20px; font-size: 16px; }
.row { display: flex; gap: 10px; margin-bottom: 8px; }
.row .btn { width: auto; flex: 1; }
</style></head><body>

<div class="section">
  <div class="label">Variantes (md)</div>
  <button class="btn btn-primary md" style="margin-bottom:8px">Añadir ingrediente</button>
  <button class="btn btn-secondary md" style="margin-bottom:8px">Ver receta completa</button>
  <button class="btn btn-ghost md" style="margin-bottom:8px">Cancelar</button>
  <button class="btn btn-danger md">Eliminar del stock</button>
</div>

<div class="section">
  <div class="label">Tamaños (primary)</div>
  <button class="btn btn-primary lg" style="margin-bottom:8px">Grande (lg)</button>
  <button class="btn btn-primary md" style="margin-bottom:8px">Mediano (md)</button>
  <button class="btn btn-primary sm">Pequeño (sm)</button>
</div>

<div class="section">
  <div class="label">Estados</div>
  <div class="row">
    <button class="btn btn-primary md">Normal</button>
    <button class="btn btn-disabled md">Desactivado</button>
  </div>
  <button class="btn btn-secondary md" style="opacity:0.7">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#6B4429" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
    Cargando…
  </button>
</div>

<div class="section">
  <div class="label">Con icono</div>
  <button class="btn btn-primary md">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Añadir al carrito
  </button>
</div>
</body></html>

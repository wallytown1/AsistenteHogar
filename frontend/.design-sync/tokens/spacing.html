<!-- @dsCard group="Fundamentos" name="Espaciado y Radio" subtitle="7 tokens spacing · 6 tokens radius" -->
<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #FAF7F2; padding: 28px; }
.label { font-size: 11px; font-weight: 800; letter-spacing: 0.6px; text-transform: uppercase; color: #AE9B87; margin-bottom: 16px; }
.section { margin-bottom: 28px; }
.row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
.bar { background: #8B5E3C; border-radius: 3px; height: 20px; flex-shrink: 0; }
.token { font-size: 12px; font-weight: 700; color: #2C1C0E; width: 52px; }
.px { font-size: 11px; color: #7A6045; }
.radius-row { display: flex; gap: 14px; flex-wrap: wrap; }
.rbox { display: flex; flex-direction: column; align-items: center; gap: 8px; }
.rblock { width: 56px; height: 56px; background: #F6EDE3; border: 2px solid #8B5E3C; }
.rname { font-size: 11px; font-weight: 700; color: #2C1C0E; }
.rval  { font-size: 10px; color: #7A6045; }
</style></head><body>

<div class="section">
  <div class="label">Spacing</div>
  <div class="row"><span class="token">xs</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="token">sm</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="token">md</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="token">lg</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="token">xl</span><div class="bar" style="width:20px"></div><span class="px">20px</span></div>
  <div class="row"><span class="token">xxl</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="token">xxxl</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
</div>

<div class="section">
  <div class="label">Border Radius</div>
  <div class="radius-row">
    <div class="rbox"><div class="rblock" style="border-radius:12px"></div><div class="rname">sm</div><div class="rval">12px</div></div>
    <div class="rbox"><div class="rblock" style="border-radius:16px"></div><div class="rname">md</div><div class="rval">16px</div></div>
    <div class="rbox"><div class="rblock" style="border-radius:20px"></div><div class="rname">lg</div><div class="rval">20px</div></div>
    <div class="rbox"><div class="rblock" style="border-radius:24px"></div><div class="rname">xl</div><div class="rval">24px</div></div>
    <div class="rbox"><div class="rblock" style="border-radius:32px"></div><div class="rname">xxl</div><div class="rval">32px</div></div>
    <div class="rbox"><div class="rblock" style="border-radius:999px"></div><div class="rname">pill</div><div class="rval">999px</div></div>
  </div>
</div>
</body></html>

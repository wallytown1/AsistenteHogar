name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas de la misma rama/PR cuando llega un push nuevo.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Backend: lint (ruff) + formato + tipos (mypy strict) + 5 smoke tests
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (lint + types + smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Requerido por config.py al importar la app. Valor ficticio: los smoke
      # tests usan SQLite temporal y fuerzan GEMINI_API_KEY="" (modo fallback).
      JWT_SECRET_KEY: ci-dummy-secret-not-used-in-production
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias (para los smoke tests) + pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pre-commit

      # Espejo fiel del escudo local: pre-commit corre Ruff (lint+formato) y Mypy
      # con los entornos AISLADOS y versiones pinneadas de .pre-commit-config.yaml
      # (mypy ve solo pydantic/sqlalchemy/bcrypt/pyjwt/types-redis, no fastapi/httpx).
      # Invocar mypy con requirements.txt completo daría un resultado más estricto
      # que el escudo que valida cada commit, divergiendo del contrato del proyecto.
      - name: Escudo de calidad (pre-commit — ruff + mypy)
        run: pre-commit run --all-files --show-diff-on-failure

      - name: Smoke tests
        run: |
          python smoke_test_auth.py
          python smoke_test_modules.py
          python smoke_test_dashboard.py
          python smoke_test_validation.py
          python smoke_test_legal.py
          python smoke_test_admin.py
          python smoke_test_perfiles.py
          python smoke_test_lista_compra.py
          python smoke_test_rechazar_ingrediente.py

      # Schemathesis: fuzzing del esquema OpenAPI contra un servidor uvicorn REAL.
      #
      # No se usa el modo ASGI in-process (--app): con SQLAlchemy async ese modo
      # comparte el engine entre el loop del test y el de la app; al cerrar
      # schemathesis cada caso, el pool intenta resetear conexiones sobre un loop
      # ya cerrado → "RuntimeError: Event loop is closed" y exit≠0 aunque el check
      # not_a_server_error pase (1057/1057). Un servidor uvicorn tiene un único
      # loop estable y elimina el problema de raíz.
      #
      # schemathesis se aísla en su PROPIO venv: su rama 3.x arrastra starlette<1.x
      # y, en el venv principal, degradaría el starlette>=1.3.1 con el que corre el
      # servidor. Aislado, schemathesis solo actúa como cliente HTTP.
      #
      # Check: ningún endpoint debe devolver 5xx (incluye req. sin autenticar → 401).
      - name: Schemathesis (API schema fuzzing)
        timeout-minutes: 10
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite+aiosqlite:///./schemathesis_test.db
          # El servidor uvicorn arranca con una BD vacía; sin esto los endpoints
          # que tocan tablas (/auth/*) dan 500 "no such table: usuarios". La app
          # ya soporta crear el esquema al arrancar vía alembic (subproceso).
          RUN_MIGRATIONS_ON_STARTUP: "true"
          # Sin ADMIN_JWT_SECRET_KEY las rutas /admin/* devuelven 503 (diseño
          # intencional), que schemathesis interpreta como server_error. Con la
          # clave dummy el backend arranca en modo admin activo y devuelve 401.
          ADMIN_JWT_SECRET_KEY: ci-dummy-admin-secret-not-used-in-production
          # bootstrap y el webhook de RC devuelven 501 ("no configurado") cuando
          # su secreto no está presente, y el check marca cualquier 5xx —incluido
          # 501— como fallo. En producción estos secretos SÍ están definidos; con
          # dummy el fuzzer ejercita la rama de auth real (401), no la de feature off.
          ADMIN_BOOTSTRAP_TOKEN: ci-dummy-bootstrap-token-not-used-in-production
          REVENUECAT_WEBHOOK_SECRET: ci-dummy-rc-webhook-secret-not-used-in-prod
        run: |
          # 1) Servidor uvicorn real (venv principal, starlette 1.3.1) en background.
          uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level warning &
          SERVER_PID=$!
          # 2) Esperar a que /health responda (máx. ~30 s).
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/health > /dev/null; then
              echo "Servidor listo tras ${i}s"; break
            fi
            sleep 1
          done
          # 3) schemathesis en venv aislado (no contamina starlette del servidor).
          python -m venv /tmp/sch-venv
          /tmp/sch-venv/bin/pip install --quiet -r requirements-dev.txt
          set +e
          /tmp/sch-venv/bin/schemathesis run \
            http://127.0.0.1:8000/openapi.json \
            --checks=not_a_server_error \
            --validate-schema=false \
            --experimental=openapi-3.1 \
            --hypothesis-max-examples=25 \
            --hypothesis-deadline=5000 \
            --workers=2
          RESULT=$?
          set -e
          # 4) Apagar el servidor y propagar el resultado del fuzzing.
          kill "$SERVER_PID" 2>/dev/null || true
          exit $RESULT

  # ---------------------------------------------------------------------------
  # Frontend: TypeScript (tsc) + ESLint
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (tsc + eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # npm install (no npm ci): el lock se genera en Windows y no pinnea las
      # dependencias opcionales nativas que npm resuelve en linux-x64 (@emnapi/*),
      # lo que rompe el modo estricto de npm ci. install reconcilia por plataforma.
      - name: Instalar dependencias
        run: npm install --no-audit --no-fund

      - name: TypeScript (0 errores)
        run: npm run ts:check

      - name: ESLint
        run: npm run lint

  # ---------------------------------------------------------------------------
  # Seguridad: CVEs en dependencias + secretos en el historial
  # ---------------------------------------------------------------------------
  security:
    name: Security (deps + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks necesita el historial completo, no solo el último commit.
          fetch-depth: 0

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: pip-audit (CVEs backend)
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt
          # Sin ignorelist: requirements.txt fija starlette>=1.3.1 (resuelve
          # PYSEC-2026-161 y CVE-2026-48818/48817/54283/54282) y schemathesis se
          # movió a requirements-dev.txt (su CVE de pytest es solo de CI/tests,
          # no de producción). El audit de producción debe quedar limpio.

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Solo bloquea ante vulnerabilidades high/critical. Las 19 moderate
      # actuales están en el toolchain de Expo/RN (build, no runtime).
      - name: npm audit frontend (high/critical)
        working-directory: frontend
        run: npm audit --audit-level=high

      # El panel admin también se audita (antes quedaba sin cobertura). Las
      # moderate restantes son de postcss (build-time de Next), no runtime.
      - name: npm audit admin-web (high/critical)
        working-directory: admin-web
        run: npm audit --audit-level=high

      - name: gitleaks (secretos en el historial)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
